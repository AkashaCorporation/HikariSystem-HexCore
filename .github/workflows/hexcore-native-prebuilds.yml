name: HexCore Native Prebuilds

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22.21.1"

jobs:
  prebuild-windows:
    name: Build Native Prebuilds (Windows)
    runs-on: windows-latest
    env:
      HEXCORE_RELEASE_TOKEN: ${{ secrets.HEXCORE_RELEASE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        engine:
          - name: hexcore-capstone
            repo: LXrdKnowkill/hexcore-capstone
          - name: hexcore-unicorn
            repo: LXrdKnowkill/hexcore-unicorn
          - name: hexcore-llvm-mc
            repo: LXrdKnowkill/hexcore-llvm-mc
          - name: hexcore-better-sqlite3
            repo: LXrdKnowkill/hexcore-better-sqlite3
          - name: hexcore-remill
            repo: LXrdKnowkill/hexcore-remill
            deps_asset: remill-deps-win32-x64.zip
            deps_tag: v0.1.0
          - name: hexcore-rellic
            repo: LXrdKnowkill/hexcore-rellic
            deps_asset: rellic-deps-win32-x64.zip
            deps_tag: v0.1.0
    steps:
      - name: Checkout Engine Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.engine.repo }}
          path: engine

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Fetch LLVM deps (hexcore-llvm-mc)
        if: ${{ matrix.engine.name == 'hexcore-llvm-mc' }}
        run: |
          $tag = "v1.0.0"
          $asset = "llvm-win32-x64.zip"
          $url = "https://github.com/LXrdKnowkill/hexcore-llvm-mc/releases/download/$tag/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          New-Item -ItemType Directory -Force engine/deps/llvm | Out-Null
          Expand-Archive -Path $asset -DestinationPath engine/deps/llvm

      - name: Fetch Remill deps (hexcore-remill)
        if: ${{ matrix.engine.name == 'hexcore-remill' && matrix.engine.deps_asset }}
        run: |
          $tag = "${{ matrix.engine.deps_tag }}"
          $asset = "${{ matrix.engine.deps_asset }}"
          $url = "https://github.com/${{ matrix.engine.repo }}/releases/download/$tag/$asset"
          Write-Host "Downloading $url ..."
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath engine -Force
          Remove-Item $asset

      - name: Fetch Rellic deps (hexcore-rellic)
        if: ${{ matrix.engine.name == 'hexcore-rellic' && matrix.engine.deps_asset }}
        run: |
          $tag = "${{ matrix.engine.deps_tag }}"
          $asset = "${{ matrix.engine.deps_asset }}"
          $url = "https://github.com/${{ matrix.engine.repo }}/releases/download/$tag/$asset"
          Write-Host "Downloading $url ..."
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath engine -Force
          Remove-Item $asset

      - name: Install Dependencies
        working-directory: engine
        run: npm ci --ignore-scripts

      - name: Build Prebuilds
        working-directory: engine
        run: npm run prebuild

      - name: Read Engine Version
        id: engine-version
        working-directory: engine
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Read N-API Version
        id: napi-version
        working-directory: engine
        run: |
          $napi = node -p "((require('./package.json').binary || {}).napi_versions || [8])[0]"
          "napi=$napi" >> $env:GITHUB_OUTPUT

      - name: Pack Prebuilds
        id: pack-prebuilds
        working-directory: engine
        run: |
          $name = node -p "require('./package.json').name"
          $version = "${{ steps.engine-version.outputs.version }}"
          $napi = "${{ steps.napi-version.outputs.napi }}"
          $asset = "$name-v$version-napi-v$napi-win32-x64.tar.gz"
          if (-not (Test-Path prebuilds)) {
            throw "prebuilds/ directory not found"
          }
          tar -czf $asset prebuilds
          "asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Pack Unicorn Runtime DLLs
        id: pack-runtime
        if: ${{ matrix.engine.name == 'hexcore-unicorn' }}
        working-directory: engine
        run: |
          $version = "${{ steps.engine-version.outputs.version }}"
          $name = "hexcore-unicorn"
          $runtimeAsset = "$name-v$version-runtime-win32-x64.tar.gz"
          $dllPath = "deps/unicorn/unicorn.dll"
          if (Test-Path $dllPath) {
            tar -czf $runtimeAsset $dllPath
            "asset=$runtimeAsset" >> $env:GITHUB_OUTPUT
            Write-Host "Packed Unicorn runtime DLL: $runtimeAsset"
          } else {
            Write-Host "WARNING: unicorn.dll not found at $dllPath — runtime asset skipped"
          }

      - name: Pack Remill Semantics
        id: pack-semantics
        if: ${{ matrix.engine.name == 'hexcore-remill' }}
        working-directory: engine
        run: |
          $version = "${{ steps.engine-version.outputs.version }}"
          $semanticsDir = "deps/remill/share/semantics"
          if (-not (Test-Path $semanticsDir)) {
            throw "Semantics directory not found: $semanticsDir"
          }
          $asset = "hexcore-remill-v$version-semantics-win32-x64.tar.gz"
          tar -czf $asset $semanticsDir
          "asset=$asset" >> $env:GITHUB_OUTPUT
          Write-Host "Packed semantics: $asset"

      - name: Upload Prebuild Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.engine.name }}-prebuilds-win32
          path: |
            engine/prebuilds/**
            engine/${{ steps.pack-prebuilds.outputs.asset }}

      - name: Upload Semantics Artifact
        if: ${{ matrix.engine.name == 'hexcore-remill' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.engine.name }}-semantics-win32
          path: engine/${{ steps.pack-semantics.outputs.asset }}

      - name: Upload Prebuilds to Release
        if: ${{ env.HEXCORE_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HEXCORE_RELEASE_TOKEN }}
          GH_REPO: ${{ matrix.engine.repo }}
          ENGINE_VERSION: ${{ steps.engine-version.outputs.version }}
        run: |
          $tag = "v$env:ENGINE_VERSION"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated native prebuilds for $env:ENGINE_VERSION"
          }
          $asset = "engine/${{ steps.pack-prebuilds.outputs.asset }}"
          if (-not (Test-Path $asset)) {
            throw "Prebuild package not found: $asset"
          }
          gh release upload $tag $asset --clobber

      - name: Upload Unicorn Runtime DLLs to Release
        if: ${{ matrix.engine.name == 'hexcore-unicorn' && env.HEXCORE_RELEASE_TOKEN != '' && steps.pack-runtime.outputs.asset }}
        env:
          GH_TOKEN: ${{ env.HEXCORE_RELEASE_TOKEN }}
          GH_REPO: ${{ matrix.engine.repo }}
          ENGINE_VERSION: ${{ steps.engine-version.outputs.version }}
        run: |
          $tag = "v$env:ENGINE_VERSION"
          $asset = "engine/${{ steps.pack-runtime.outputs.asset }}"
          if (Test-Path $asset) {
            gh release upload $tag $asset --clobber
            Write-Host "Uploaded Unicorn runtime DLL asset"
          }
          # Also upload the raw DLL for fallback download
          $dll = "engine/deps/unicorn/unicorn.dll"
          if (Test-Path $dll) {
            gh release upload $tag $dll --clobber
            Write-Host "Uploaded unicorn.dll as standalone asset"
          }

      - name: Upload Semantics to Release
        if: ${{ matrix.engine.name == 'hexcore-remill' && env.HEXCORE_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HEXCORE_RELEASE_TOKEN }}
          GH_REPO: ${{ matrix.engine.repo }}
          ENGINE_VERSION: ${{ steps.engine-version.outputs.version }}
        run: |
          $tag = "v$env:ENGINE_VERSION"
          $asset = "engine/${{ steps.pack-semantics.outputs.asset }}"
          if (-not (Test-Path $asset)) {
            throw "Semantics package not found: $asset"
          }
          gh release upload $tag $asset --clobber

  # All prebuildify engines (Capstone, Unicorn, LLVM-MC, SQLite, Remill, Rellic)
  # are in the main prebuild matrix above.

  # ---------------------------------------------------------------------------
  # Helix — NAPI-RS build (separate job, requires LLVM 18 + MLIR)
  # ---------------------------------------------------------------------------
  prebuild-helix-windows:
    name: Build Helix NAPI-RS (Windows)
    runs-on: windows-latest
    env:
      HEXCORE_RELEASE_TOKEN: ${{ secrets.HEXCORE_RELEASE_TOKEN }}
    steps:
      - name: Checkout Helix Repository
        uses: actions/checkout@v6
        with:
          repository: AkashaCorporation/HexCore-Helix
          path: engine

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Cache Helix LLVM/MLIR Deps
        id: cache-helix-deps
        uses: actions/cache@v5
        with:
          path: engine/engine/deps/llvm-mlir
          key: helix-llvm-mlir-win32-x64-v3-${{ hashFiles('engine/crates/hexcore-helix/Cargo.toml', 'engine/package.json') }}

      - name: Download Helix LLVM/MLIR Deps
        if: steps.cache-helix-deps.outputs.cache-hit != 'true'
        working-directory: engine/engine
        run: |
          $version = node -p "require('../package.json').version"
          $tag = "v$version"
          $asset = "helix-llvm-mlir-deps-win32-x64.zip"
          $url = "https://github.com/AkashaCorporation/HexCore-Helix/releases/download/$tag/$asset"
          Write-Host "Downloading Helix LLVM/MLIR deps from $url (tag: $tag) ..."

          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $asset -TimeoutSec 600
              $success = $true
            } catch {
              $retryCount++
              Write-Host "Download failed (attempt $retryCount/$maxRetries): $_"
              if ($retryCount -lt $maxRetries) {
                Write-Host "Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw "Failed to download after $maxRetries attempts"
              }
            }
          }

          New-Item -ItemType Directory -Force deps | Out-Null
          Expand-Archive -Path $asset -DestinationPath deps -Force
          Remove-Item $asset

      - name: Verify Engine Lib
        working-directory: engine/engine
        run: |
          $libPath = "deps/llvm-mlir/engine/helix_engine.lib"
          if (Test-Path $libPath) {
            $size = (Get-Item $libPath).Length / 1MB
            Write-Host "✓ helix_engine.lib found: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "✗ helix_engine.lib NOT FOUND at $libPath"
            Write-Host "Deps directory contents:"
            if (Test-Path "deps") {
              Get-ChildItem deps -Recurse -Filter "*.lib" | Select-Object FullName
            }
            exit 1
          }

      - name: Install Dependencies
        working-directory: engine
        run: npm ci --ignore-scripts

      - name: Build NAPI-RS Module
        working-directory: engine
        env:
          LLVM_LIB_DIR: ${{ github.workspace }}/engine/engine/deps/llvm-mlir/lib
          HELIX_ENGINE_LIB: ${{ github.workspace }}/engine/engine/deps/llvm-mlir/engine
        run: npm run build

      - name: Read Engine Version
        id: engine-version
        working-directory: engine
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Locate and Pack NAPI-RS Binary
        id: pack-napi
        working-directory: engine
        run: |
          $version = "${{ steps.engine-version.outputs.version }}"
          $binaryName = node -p "require('./package.json').napi.binaryName"
          $nodeFile = "$binaryName.win32-x64-msvc.node"
          # NAPI-RS may output to cwd or crates/hexcore-helix/
          $candidates = @(
            "$nodeFile",
            "crates/hexcore-helix/$nodeFile"
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $found = $c; break }
          }
          if (-not $found) {
            throw "NAPI-RS .node file not found. Searched: $($candidates -join ', ')"
          }
          # Copy to root for upload
          if ($found -ne $nodeFile) {
            Copy-Item $found $nodeFile
          }
          # Pack as tar.gz for release (same pattern as prebuildify engines)
          $asset = "$binaryName-v$version-napi-win32-x64.node"
          Copy-Item $nodeFile $asset
          "asset=$asset" >> $env:GITHUB_OUTPUT
          "nodeFile=$nodeFile" >> $env:GITHUB_OUTPUT
          Write-Host "Packed NAPI-RS binary: $asset ($(Get-Item $asset | Select-Object -ExpandProperty Length) bytes)"

      - name: Upload NAPI-RS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexcore-helix-napi-win32
          path: |
            engine/${{ steps.pack-napi.outputs.asset }}

      - name: Upload NAPI-RS Binary to Release
        if: ${{ env.HEXCORE_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HEXCORE_RELEASE_TOKEN }}
          GH_REPO: AkashaCorporation/HexCore-Helix
          ENGINE_VERSION: ${{ steps.engine-version.outputs.version }}
        run: |
          $tag = "v$env:ENGINE_VERSION"
          gh release view $tag --repo $env:GH_REPO *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GH_REPO --title $tag --notes "Automated NAPI-RS prebuilds for Helix $env:ENGINE_VERSION"
          }
          $asset = "engine/${{ steps.pack-napi.outputs.asset }}"
          if (-not (Test-Path $asset)) {
            throw "NAPI-RS binary not found: $asset"
          }
          gh release upload $tag $asset --repo $env:GH_REPO --clobber
